name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:once
      - run: npm run build

  e2e:
    needs: test
    runs-on: ubuntu-latest
    # Only run if the e2e secrets are configured
    if: vars.E2E_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # For PRs, derive the Vercel preview URL from the branch name and wait for it.
      # For pushes to main, use the production URL from vars.E2E_BASE_URL.
      - name: Resolve target URL
        id: target-url
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.head_ref }}"
            SLUG=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\+/-/g' | sed 's/^-//;s/-$//')
            URL="https://den-git-${SLUG}-delimiters-projects.vercel.app"
            echo "url=$URL" >> $GITHUB_OUTPUT
            echo "Waiting for Vercel preview: $URL"
            for i in $(seq 1 36); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Preview ready after ~$((i * 5))s"
                break
              fi
              if [ "$i" = "36" ]; then
                echo "Preview not ready after 3 minutes, proceeding anyway"
              fi
              sleep 5
            done
          else
            echo "url=${{ vars.E2E_BASE_URL }}" >> $GITHUB_OUTPUT
            echo "Using production URL: ${{ vars.E2E_BASE_URL }}"
          fi

      # Cache Playwright browser binaries keyed by the installed Playwright version
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(node -e "console.log(require('./node_modules/@playwright/test/package.json').version)")" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ steps.pw-version.outputs.version }}
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright system deps (cached hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e
        env:
          E2E_BASE_URL: ${{ steps.target-url.outputs.url }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy-functions:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Requires SUPABASE_ACCESS_TOKEN secret in GitHub repo settings
      # (Settings → Secrets → Actions → New repository secret)
      - name: Deploy Edge Functions
        run: |
          supabase functions deploy upload-url --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
          supabase functions deploy livekit-token --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # TODO: deploy-web (when web hosting is set up)
  # - Build the Vite app
  # - Deploy to Cloudflare Pages or similar
  # - Requires VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY secrets

  # TODO: tauri-build (when desktop releases are needed)
  # - Build Tauri app for Windows/Mac/Linux
  # - Upload artifacts to GitHub Releases
  # - Uses tauri-action: https://github.com/tauri-apps/tauri-action
