name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:once
      - run: npm run build

  e2e:
    needs: test
    runs-on: ubuntu-latest
    # Only run if the e2e secrets are configured
    if: vars.E2E_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Cache Playwright browser binaries keyed by the installed Playwright version
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(node -e "console.log(require('./node_modules/@playwright/test/package.json').version)")" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ steps.pw-version.outputs.version }}
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright system deps (cached hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e
        env:
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy-functions:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Requires SUPABASE_ACCESS_TOKEN secret in GitHub repo settings
      # (Settings → Secrets → Actions → New repository secret)
      - name: Deploy Edge Functions
        run: |
          supabase functions deploy upload-url --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
          supabase functions deploy livekit-token --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # TODO: deploy-web (when web hosting is set up)
  # - Build the Vite app
  # - Deploy to Cloudflare Pages or similar
  # - Requires VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY secrets

  # TODO: tauri-build (when desktop releases are needed)
  # - Build Tauri app for Windows/Mac/Linux
  # - Upload artifacts to GitHub Releases
  # - Uses tauri-action: https://github.com/tauri-apps/tauri-action
