name: Release

on:
  push:
    branches: [main]

jobs:
  # Compute the next patch version and create the tag — all in this run so we
  # don't depend on a separate tag-push event (which GITHUB_TOKEN can't trigger).
  prepare:
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next patch and create tag
        id: ver
        run: |
          latest=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          [ -z "$latest" ] && latest="v0.2.3"
          version=${latest#v}
          major=$(echo "$version" | cut -d. -f1)
          minor=$(echo "$version" | cut -d. -f2)
          patch=$(echo "$version" | cut -d. -f3)
          new_version="$major.$minor.$((patch + 1))"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v$new_version"
          git push origin "v$new_version"
          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          echo "Tagged v$new_version"

  build:
    needs: prepare
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rust-targets: x86_64-pc-windows-msvc

          - platform: macos-latest
            target: universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin

          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rust-targets: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Patch version from tag
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > /tmp/tc.json
          mv /tmp/tc.json src-tauri/tauri.conf.json
          python3 -c "
          import re, pathlib
          p = pathlib.Path('src-tauri/Cargo.toml')
          content = re.sub(r'^version = \"[^\"]+\"', 'version = \"$VERSION\"', p.read_text(), count=1, flags=re.MULTILINE)
          p.write_text(content)
          "

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ needs.prepare.outputs.version }}
          releaseName: 'Den v${{ needs.prepare.outputs.version }}'
          releaseBody: |
            ## Download

            | Platform | Installer |
            |----------|-----------|
            | Windows | `Den_x.x.x_x64-setup.exe` |
            | macOS (Apple Silicon + Intel) | `Den_x.x.x_universal.dmg` |
            | Linux | `den_x.x.x_amd64.AppImage` or `den_x.x.x_amd64.deb` |

            Download the file for your OS from the assets below.

            > **Note:** These pre-built installers connect to the official Den servers.
            > If you want to run your own backend (self-hosted Supabase, LiveKit, etc.),
            > you'll need to clone the repo, add your own `.env.local`, and build from source.
          releaseDraft: true
          prerelease: false
          updaterJsonKeepUniversal: true
          args: --target ${{ matrix.target }}

  publish:
    needs: [prepare, build]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = 'v${{ needs.prepare.outputs.version }}';
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const release = releases.find(r => r.tag_name === tag);
            if (!release) throw new Error(`No draft release found for tag ${tag}`);
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
            });
