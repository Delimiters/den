name: Tauri E2E (Windows)

# Runs on every PR targeting main and on pushes to main.
# Non-blocking (continue-on-error) until we've confirmed green for 2+ weeks.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  windows-e2e:
    name: Windows WebView2 E2E
    runs-on: windows-latest
    # Flip to false once the job is reliably green
    continue-on-error: true
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (debug, no installer)
        run: npm run tauri build -- --debug --no-bundle --target x86_64-pc-windows-msvc
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Add msedgedriver to PATH
        shell: pwsh
        run: |
          $driver = Get-ChildItem `
            -Path "C:\Program Files (x86)\Microsoft\Edge\Application" `
            -Filter "msedgedriver.exe" -Recurse -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $driver) {
            $driver = Get-Command msedgedriver.exe -ErrorAction SilentlyContinue
            if (-not $driver) { Write-Error "msedgedriver not found on runner"; exit 1 }
            Write-Host "msedgedriver already in PATH"
            exit 0
          }
          "$($driver.DirectoryName)" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "Added msedgedriver from $($driver.DirectoryName)"

      - name: Run E2E tests
        run: npm run test:tauri-e2e
        env:
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
